name: Generate note draft articles

on:
  schedule:
    - cron: "0 21 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate draft files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          PR_BODY_PATH: ${{ runner.temp }}/note-drafts-pr-body.md
        run: python scripts/generate_note_drafts.py

      - name: Check generated changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Generate note draft articles"
          title: "Generate note draft articles"
          body-path: ${{ runner.temp }}/note-drafts-pr-body.md
          branch: automation/generate-note-drafts-${{ github.run_id }}
          delete-branch: true
          add-paths: |
            articles/drafts
            x_posts/drafts
            checklists/drafts
            metadata/drafts
            .automation/processed.json
