name: Generate note draft articles

on:
  schedule:
    - cron: "0 21 * * 1,4"
  workflow_dispatch:
  push:
    paths:
      - "notes/**/*.md"
      - "scripts/**"
      - ".github/workflows/generate-note-drafts.yml"

permissions:
  contents: write

concurrency:
  group: generate-note-drafts-main
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate draft files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          PR_BODY_PATH: ${{ runner.temp }}/note-drafts-summary.md
        run: python scripts/generate_note_drafts.py

      - name: Check generated changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes."
          fi

      - name: Commit generated changes to main
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/drafts note_posts/drafts x_posts/drafts checklists/drafts metadata/drafts .automation/processed.json
          git commit -m "Generate note draft articles"
          git push origin HEAD:main
